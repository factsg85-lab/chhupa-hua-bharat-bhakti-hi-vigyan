<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VED-01: ऋग्वेद मण्डल 1</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: #ffd700; font-size: 18px; z-index: 100; text-align: center;
            background: rgba(0,0,0,0.8); padding: 20px 40px; border-radius: 10px;
        }
        #flipbook { width: 100vw; height: 100vh; }
      .page-info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #ffd700; padding: 8px 15px;
            border-radius: 20px; font-size: 14px; z-index: 50; border: 1px solid #ffd700;
        }
      .title-bar {
            position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.7);
            color: #ffd700; padding: 10px; text-align: center; z-index: 50; font-size: 16px;
        }
      .download-btn {
            position: fixed; top: 50px; right: 20px; z-index: 100;
            background: #28a745; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; cursor: pointer; font-size: 14px;
        }
      .download-btn:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="title-bar">📚 VED-01: ऋग्वेद संहिता - मण्डल 1 | छुपा हुआ भारत</div>
    <button class="download-btn" onclick="downloadTXT()">📥 Links TXT Download</button>
    <div id="loader">📖 ग्रंथ खुल रहा है...<br><span id="percent">0%</span></div>
    <div id="flipbook"></div>
    <div class="page-info">पृष्ठ <span id="current">1</span> / <span id="total">403</span></div>

    <script>
        const pages = [
            "https://i.ibb.co/Wv2fBVRz/489d5aa2bfec.jpg",
            "https://i.ibb.co/gMr4mvZR/3cd59730f437.jpg",
            "https://i.ibb.co/gbmJpfmB/271bada1410f.jpg",
            "https://i.ibb.co/23PFzKjh/92d2831f696c.jpg",
            "https://i.ibb.co/n8wNNCFH/159b0a33abf2.jpg",
            "https://i.ibb.co/4nPjy5ZP/17bfa807501d.jpg",
            "https://i.ibb.co/RkV81Cdn/7dfb95bb2ce7.jpg",
            "https://i.ibb.co/F4qP1nJ9/74c98f7825e1.jpg",
            "https://i.ibb.co/qFRT1CdK/5c2d15d3e365.jpg",
            "https://i.ibb.co/chX76psx/6f8a868e7316.jpg",
            "https://i.ibb.co/yBWFVddR/ab5c86bb43f7.jpg",
            "https://i.ibb.co/JW1RXjZz/b38524430ea5.jpg",
            "https://i.ibb.co/fYtqYfzf/8f93ea050a0c.jpg",
            "https://i.ibb.co/Xk4fGdkJ/90c0c3824e4b.jpg",
            "https://i.ibb.co/4wvKmRsr/e1d735455934.jpg",
            "https://i.ibb.co/LX7nLbQM/89d9425fb2d0.jpg",
            "https://i.ibb.co/tpH6X0R7/244db5ca4e58.jpg",
            "https://i.ibb.co/KzRgPhwT/c5921e59a479.jpg",
            "https://i.ibb.co/TB4xdrtD/f0b21069e4f8.jpg",
            "https://i.ibb.co/TDdFJ7tK/c996dc31664b.jpg",
            //... yahan baaki 383 links daal do jo tumne diye the
            "https://i.ibb.co/5hxm2Cr5/cc7952256c63.jpg"
        ];

        // === TEXT FILE DOWNLOAD FUNCTION ===
        function downloadTXT() {
            let txtContent = "const pages = [\n";
            pages.forEach(link => {
                txtContent += ` "${link}",\n`;
            });
            txtContent += "];";

            const blob = new Blob([txtContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'VED-01_Mandal_1_links.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // === FLIPBOOK CODE ===
        document.getElementById('total').innerText = pages.length;
        const loader = document.getElementById('loader');
        const percentEl = document.getElementById('percent');

        const pageFlip = new St.PageFlip(document.getElementById("flipbook"), {
            width: 550,
            height: 733,
            size: "stretch",
            minWidth: 315,
            maxWidth: 1000,
            minHeight: 420,
            maxHeight: 1350,
            maxShadowOpacity: 0.5,
            showCover: true,
            mobileScrollSupport: false,
            usePortrait: true
        });

        let loadedCount = 0;
        const totalImages = pages.length;

        function updateLoader() {
            loadedCount++;
            const percent = Math.round(loadedCount / totalImages * 100);
            percentEl.innerText = percent + '%';
            if (loadedCount >= 5) loader.style.display = 'none';
        }

        const imageObjects = pages.map((url, index) => {
            const img = new Image();
            if (index < 5) {
                img.src = url;
                img.onload = updateLoader;
                img.onerror = updateLoader;
            }
            return url;
        });

        pageFlip.loadFromImages(imageObjects);

        pageFlip.on('flip', (e) => {
            document.getElementById('current').innerText = e.data + 1;
        });

        document.getElementById('current').innerText = '1';
    </script>
</body>
</html>
